<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login · Ledger</title>
    <link rel="stylesheet" th:href="@{/css/LoginStyle.css}">
</head>
<body>
<div class="container">
    <div class="page">
        <h1 class="headline">Sign in to your ledger</h1>
        <div class="entry-card">

            <form th:action="@{/login}" method="post">
                <div class="details">
                    <div class="name">
                        <label for="username">Name:</label>
                        <input type="text" id="username" name="username" placeholder="Type your name" required autofocus>
                    </div>
                    <div class="email">
                        <label for="email">Email:</label>
                        <input type="email"  id="email" name="email" placeholder="Type Your Email" required>
                    </div>
                </div>
                <div class="button">
                    <button type="submit" class="login-btn">Login</button>
                </div>
            </form>
        </div>

        <p class="footnote">No password needed — just tell us who's keeping the books.</p>
    </div>
</div>
</body>
</html>
